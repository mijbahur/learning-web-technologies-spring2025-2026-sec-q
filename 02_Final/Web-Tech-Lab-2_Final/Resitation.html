<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Resitation</title>
</head>

<body>

    <fieldset>
        <legend>Resitation</legend>

        <form onsubmit="return validateForm()">


            <table border="1" cellpadding="10" cellspacing="0" align="center">

                <tr>
                    <td><label for="name">Name</label></td>
                    <td><input type="text" id="name"></td>
                </tr>

                <tr>
                    <td><label for="email">Email</label></td>
                    <td><input type="text" id="email"></td>
                </tr>

                <tr>
                    <td><label for="username">Username</label></td>
                    <td><input type="text" id="username"></td>
                </tr>

                <tr>
                    <td><label for="passwprd">Password</label></td>
                    <td><input type="password" id="name"></td>
                </tr>
                <tr>
                    <td><label for="confirmPassword">Confirm Password</label></td>
                    <td><input type="password" id="confirmPassword"></td>
                </tr>

                <tr>
                    <td>Gender</td>
                    <td>
                        <input type="radio" name="gender" value="male" id="male">
                        <label for="male">Male</label>
                        <input type="radio" name="gender" value="female" id="female">
                        <label for="female">Female</label>
                        <input type="radio" name="gender" value="other" id="other">
                        <label for="other">Other</label>
                    </td>
                </tr>

                <tr>
                    <td>Date of Birth</td>
                    <td>
                        <input type="text" size="2" maxlength="2" id="dd"> /
                        <input type="text" size="2" maxlength="2" id="mm"> /
                        <input type="text" size="4" maxlength="4" id="yyyy">
                        (dd/mm/yyyy)
                    </td>
                </tr>

                <tr align="center">
                    <td colspan="2">
                        <button type="submit">Submit</button>
                        <button type="reset">Reset</button>
                    </td>
                </tr>

            </table>

        </form>
    </fieldset>
    <script src="JS/script.js"></script>

</body>

</html>
