<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Picture</title>
</head>

<body>
    <fieldset style="width: 310px;">
        <legend>Profile Picture</legend>
        <form onsubmit="return validateProfile()">
            <label for="userId">User Id</label>
            <input type="text" value="" id="userId"><br><br>
            <picture>
                <label for="picture">Picture</label>
                <input type="file" id="picture" value="picture" accept=".jpg, .jpge, .png"><br>
            </picture><br>
            <button type="submit">Submit</button>
        </form>
    </fieldset>
    <script>
        function validateProfile() {

            let userId = document.getElementById("userId").value.trim();
            let picture = document.getElementById("picture").value;

            if (userId === "") {
                alert("User Id cannot be empty");
                return false;
            }

            if (isNaN(userId) || Number(userId) <= 0) {
                alert("User Id must be a positive number");
                return false;
            }

            if (picture === "") {
                alert("Please select a picture");
                return false;
            }

            alert("Form submitted successfully!");
            return true;
        }
    </script>
</body>

</html>
