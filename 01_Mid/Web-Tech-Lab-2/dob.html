<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date of Birth</title>
</head>

<body>
    <fieldset style="width: 200px;">
        <legend>Date of Birth</legend>
        <!-- <form>
                <input type="date">
            </form> -->

        <form onsubmit="return validateDOB()">
            <table>
                <tr align="center">
                    <td>dd&nbsp;&nbsp;</td>
                    <td>mm&nbsp;&nbsp;</td>
                    <td>yyyy&nbsp;</td>
                </tr>
                <tr>
                    <td><input type="text" size="2" maxlength="2" id="dd"> / </td>
                    <td><input type="text" size="2" maxlength="2" id="mm"> / </td>
                    <td><input type="text" size="4" maxlength="4" id="yyyy"></td>
                </tr>
            </table>
            <hr>

            <button type="submit">Submit</button>
        </form>

    </fieldset>
    <script>
        function validateDOB() {

            let dd = document.getElementById("dd").value.trim();
            let mm = document.getElementById("mm").value.trim();
            let yyyy = document.getElementById("yyyy").value.trim();

            if (dd === "" || mm === "" || yyyy === "") {
                alert("All fields are required");
                return false;
            }

            if (isNaN(dd) || isNaN(mm) || isNaN(yyyy)) {
                alert("Date must be numeric");
                return false;
            }

            dd = Number(dd);
            mm = Number(mm);
            yyyy = Number(yyyy);

            if (dd < 1 || dd > 31) {
                alert("Day must be between 1 and 31");
                return false;
            }

            if (mm < 1 || mm > 12) {
                alert("Month must be between 1 and 12");
                return false;
            }

            if (yyyy < 1900 || yyyy > 2016) {
                alert("Year must be between 1900 and 2016");
                return false;
            }

            error.innerHTML = "";
            alert("Date submitted successfully!");
            return true;
        }
    </script>

</body>

</html>
